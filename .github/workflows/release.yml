name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            builder-args: --linux
          - os: windows-latest
            platform: windows
            builder-args: --win

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder ${{ matrix.builder-args }} --publish never
      - name: Upload AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage
      - name: Upload deb
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/*.deb
      - name: Upload rpm
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: release/*.rpm
      - name: Upload Linux zip
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: release/*.zip
      - name: Upload Windows exe
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/*.exe
      - name: Upload Windows zip
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: release/*.zip
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: release/*
