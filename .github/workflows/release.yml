name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/*.deb
      - uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: release/*.rpm
      - uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: release/*.zip
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: release/*
