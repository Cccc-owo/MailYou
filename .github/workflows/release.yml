name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            builder-args: --linux
            artifacts: |
              release/*.AppImage
              release/*.deb
              release/*.rpm
              release/*.zip
          - os: windows-latest
            platform: windows
            builder-args: --win
            artifacts: |
              release/*.exe
              release/*.zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder ${{ matrix.builder-args }} --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-dist
          path: ${{ matrix.artifacts }}
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: release/*
